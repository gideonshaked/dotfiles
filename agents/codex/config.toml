model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "friendly"
approvals_reviewer = "user"
approval_policy = "never"
sandbox_mode = "danger-full-access"
suppress_unstable_features_warning = true

[mcp_servers]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.gcloud]
command = "bash"
args = ["-lc", "exec \"$HOME/bin/dotfiles-npx\" -y @google-cloud/gcloud-mcp"]

[notice]
hide_full_access_warning = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "task-progress"]
terminal_title = ["activity", "task-progress", "current-dir", "git-branch", "app-name"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."life-science-research@openai-curated"]
enabled = false

[plugins."github@openai-curated"]
enabled = true

[plugins."hugging-face@openai-curated"]
enabled = false

[plugins."google-calendar@openai-curated"]
enabled = false

[plugins."gmail@openai-curated"]
enabled = false

[plugins."google-drive@openai-curated"]
enabled = false

[features]
apps = false
memories = true
terminal_resize_reflow = true
prevent_idle_sleep = true
goals = true

[projects."/Users/gideonshaked/Documents/personal/dev/dotfiles"]
trust_level = "trusted"

[projects."/Users/gideonshaked"]
trust_level = "trusted"

[mcp_servers.context7]
type = "http"
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.env_http_headers]
CONTEXT7_API_KEY = "CONTEXT7_API_KEY"
