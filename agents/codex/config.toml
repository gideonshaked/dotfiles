model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "friendly"
approvals_reviewer = "user"
approval_policy = "never"
sandbox_mode = "danger-full-access"
suppress_unstable_features_warning = true

[mcp_servers]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[notice]
hide_full_access_warning = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "task-progress"]
terminal_title = ["activity", "task-progress", "current-dir", "git-branch", "app-name"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."life-science-research@openai-curated"]
enabled = false

[plugins."github@openai-curated"]
enabled = true

[plugins."hugging-face@openai-curated"]
enabled = false

[plugins."google-calendar@openai-curated"]
enabled = false

[plugins."gmail@openai-curated"]
enabled = false

[plugins."google-drive@openai-curated"]
enabled = false

[features]
apps = false
memories = true
terminal_resize_reflow = true
prevent_idle_sleep = true
goals = true
