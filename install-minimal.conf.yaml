- defaults:
    link:
      relink: true
      create: true
      force: true

- clean: ["~", "~/.zsh", "~/.claude"]

- link:
    # Terminal
    ~/.zsh: term/zsh
    ~/.bashrc.dotfiles: term/bashrc.dotfiles
    ~/.bash_prompt: term/bash_prompt.bash

    # Git
    ~/.gitalias.txt: git/gitalias.txt
    ~/.gitignore: git/gitignore

    # SSH
    ~/.ssh/config: ssh/config

    # Claude
    ~/.claude/settings.json: claude/claude-settings.json
    ~/.config/ccstatusline/settings.json: claude/ccstatusline-settings.json

    # Scripts
    ~/bin: bin

- shell:
    # Bash: source dotfiles bashrc (non-destructive)
    - description: Hooking into .bashrc and .bash_profile
      command: |
        grep -qF 'bashrc.dotfiles' "$HOME/.bashrc" 2>/dev/null || \
          echo '[ -f "$HOME/.bashrc.dotfiles" ] && . "$HOME/.bashrc.dotfiles"' >> "$HOME/.bashrc"
        grep -qF 'bashrc.dotfiles' "$HOME/.bash_profile" 2>/dev/null || \
          echo '[ -f "$HOME/.bashrc.dotfiles" ] && . "$HOME/.bashrc.dotfiles"' >> "$HOME/.bash_profile"
      stdout: true
      stderr: true

    # Git aliases: add include only if not already present
    - description: Configuring git aliases
      command: |
        git config --global --get-all include.path 2>/dev/null | grep -qF 'gitalias.txt' || \
          git config --global --add include.path ~/.gitalias.txt
        git config --global --get core.excludesfile >/dev/null 2>&1 || \
          git config --global core.excludesfile ~/.gitignore
      stdout: true
      stderr: true

    # ccstatusline: best effort, failure does not abort install
    - description: Installing ccstatusline (optional)
      command: |
        if command -v npx >/dev/null 2>&1; then
          npx -y --package ccstatusline@latest node -e "process.exit(0)" 2>/dev/null && echo "ccstatusline OK" || echo "ccstatusline install failed (non-fatal)"
        else
          echo "npx not found, skipping ccstatusline (non-fatal)"
        fi
      stdout: true
      stderr: true
