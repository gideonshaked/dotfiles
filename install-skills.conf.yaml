- defaults:
    link:
      relink: true
      create: true
      force: true

- clean: ["~/.claude"]

- link:
    ~/.claude/CLAUDE.md: claude/claude-skills/CLAUDE.md
    ~/.claude/skills:
      path: claude/claude-skills/skills
      glob: false
    ~/.claude/commands:
      path: claude/claude-skills/commands
      glob: false
