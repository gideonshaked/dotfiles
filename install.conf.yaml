- defaults:
    link:
      relink: true
      create: true

- clean: ["~", "~/.zsh", "~/.claude"]

- link:
    # Common
    ~/.zsh: term/zsh
    ~/.gitalias.txt: git/gitalias.txt
    ~/.gitignore: git/gitignore
    ~/.ssh/config: ssh/config
    ~/bin:
      path: bin
      if: scripts/should-link-bin

    # Full install
    ~/.zshrc:
      path: term/zshrc
      if: scripts/is-full-install
    ~/.config/starship.toml:
      path: term/starship.toml
      if: scripts/is-full-install
    ~/.gitconfig:
      path: git/gitconfig
      if: scripts/is-full-install
    ~/.gitattributes:
      path: git/gitattributes
      if: scripts/is-full-install
    ~/Library/Application Support/Code/User/settings.json:
      path: vscode/settings.json
      if: scripts/is-full-install
    ~/Library/Application Support/Code/User/keybindings.json:
      path: vscode/keybindings.json
      if: scripts/is-full-install
    ~/Library/Preferences/clangd/config.yaml:
      path: clang/config.yaml
      if: scripts/is-full-install
    ~/.clang-format:
      path: clang/clang-format
      if: scripts/is-full-install

    # Minimal install
    ~/.bashrc.dotfiles:
      path: term/bashrc.dotfiles
      force: true
      if: scripts/is-minimal-install
    ~/.bash_prompt:
      path: term/bash_prompt.bash
      force: true
      if: scripts/is-minimal-install

    # Agents
    ## Claude
    ~/.claude/settings.json:
      path: agents/claude/settings.json
      force: true
    ~/.config/ccstatusline/settings.json:
      path: agents/claude/ccstatusline-settings.json
      force: true
    ~/.claude/CLAUDE.md:
      path: agents/shared/instructions.md
      force: true
    ~/.claude/skills:
      path: agents/claude/skills
      glob: false
      force: true
    ~/.claude/commands:
      path: agents/claude/commands
      glob: false
      force: true
    ## Codex
    ~/.codex/config.toml:
      path: agents/codex/config.toml
      force: true
    ~/.codex/AGENTS.md:
      path: agents/shared/instructions.md
      force: true
    ~/.codex/skills:
      path: agents/codex/skills
      glob: false
      force: true

- shell:
    # Bash: source dotfiles bashrc on minimal installs only
    - description: Hooking into .bashrc and .bash_profile
      command: scripts/configure-bash-hooks
      quiet: true
      stdout: true
      stderr: true

    # Git aliases: add include only if not already present
    - description: Configuring git aliases
      command: scripts/configure-git
      quiet: true
      stdout: true
      stderr: true

    # Bin tools: merge required dotfiles entrypoints into preexisting ~/bin
    - description: Linking bin tools
      command: scripts/link-bin-tools
      quiet: true
      stdout: true
      stderr: true

    # npx: install user-local Node via nvm before npx-based agent helpers
    - description: Installing npx with nvm if needed (optional)
      command: scripts/ensure-npx
      quiet: true
      stdout: true
      stderr: true

    # ccstatusline: best effort, failure does not abort install
    - description: Installing ccstatusline (optional)
      command: scripts/install-ccstatusline
      quiet: true
      stdout: true
      stderr: true

    # Agent plugins
    - description: Installing and updating Claude plugins (optional)
      command: scripts/install-claude-plugins
      quiet: true
      stdout: true
      stderr: true
    - description: Installing and updating Codex plugins (optional)
      command: scripts/install-codex-plugins
      quiet: true
      stdout: true
      stderr: true
    - description: Installing agent MCPs (optional)
      command: scripts/install-agent-mcps
      quiet: true
      stdout: true
      stderr: true
