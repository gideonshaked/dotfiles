- defaults:
    link:
      relink: true
      create: true
      glob: true

- clean: ["~", "~/.zsh", "~/.claude"]

- link:
    # Terminal
    ~/.zsh: term/zsh
    ~/.zshrc: term/zshrc
    ~/.config/starship.toml: term/starship.toml

    # Git
    ~/.gitconfig: git/gitconfig
    ~/.gitalias.txt: git/gitalias.txt
    ~/.gitattributes: git/gitattributes
    ~/.gitignore: git/gitignore

    # SSH
    ~/.ssh/config: ssh/config

    # Claude
    ~/.claude/settings.json: claude/claude-settings.json
    ~/.config/ccstatusline/settings.json: claude/ccstatusline-settings.json

    # VSCode (macOS)
    ~/Library/Application Support/Code/User/settings.json: vscode/settings.json
    ~/Library/Application Support/Code/User/keybindings.json: vscode/keybindings.json

    # Clang
    ~/Library/Preferences/clangd/config.yaml: clang/config.yaml
    ~/.clang-format: clang/clang-format

    # Scripts
    ~/bin: bin

- shell:
    # Git aliases: add include only if not already present
    - description: Configuring git aliases
      command: |
        git config --global --get-all include.path 2>/dev/null | grep -qF 'gitalias.txt' || \
          git config --global --add include.path ~/.gitalias.txt
        git config --global --get core.excludesfile >/dev/null 2>&1 || \
          git config --global core.excludesfile ~/.gitignore
      stdout: true
      stderr: true

    # ccstatusline: best effort, failure does not abort install
    - description: Installing ccstatusline (optional)
      command: |
        if command -v npx >/dev/null 2>&1; then
          npx -y --package ccstatusline@latest node -e "process.exit(0)" 2>/dev/null && echo "ccstatusline OK" || echo "ccstatusline install failed (non-fatal)"
        else
          echo "npx not found, skipping ccstatusline (non-fatal)"
        fi
      stdout: true
      stderr: true

    # Claude plugins: install/update from settings.json
    - description: Installing and updating Claude plugins (optional)
      command: |
        if ! command -v claude >/dev/null 2>&1; then
          echo "claude CLI not found, skipping plugins (non-fatal)"
          exit 0
        fi
        if ! command -v jq >/dev/null 2>&1; then
          echo "jq not found, skipping plugins (non-fatal)"
          exit 0
        fi
        SETTINGS="$HOME/.claude/settings.json"
        if [ ! -f "$SETTINGS" ]; then
          echo "settings.json not found, skipping plugins (non-fatal)"
          exit 0
        fi
        # Add marketplaces
        jq -r '.extraKnownMarketplaces // {} | to_entries[] | .value.source.repo' "$SETTINGS" | while read -r repo; do
          echo "Adding marketplace: $repo"
          claude plugins marketplace add "$repo" || true
        done
        # Install or update plugins
        jq -r '.enabledPlugins // {} | keys[]' "$SETTINGS" | while read -r plugin; do
          echo "Installing/updating plugin: $plugin"
          claude plugins install "$plugin" 2>/dev/null || claude plugins update "$plugin" 2>/dev/null || true
        done
        echo "Claude plugins OK"
      stdout: true
      stderr: true
