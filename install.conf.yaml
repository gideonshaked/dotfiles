- defaults:
    link:
      relink: true
      create: true

- clean: ["~", "~/.zsh", "~/.claude"]

- link:
    # Common
    ~/.zsh: term/zsh
    ~/.gitalias.txt: git/gitalias.txt
    ~/.gitignore: git/gitignore
    ~/.ssh/config: ssh/config
    ~/bin: bin

    # Full install
    ~/.zshrc:
      path: term/zshrc
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/.config/starship.toml:
      path: term/starship.toml
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/.gitconfig:
      path: git/gitconfig
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/.gitattributes:
      path: git/gitattributes
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/Library/Application Support/Code/User/settings.json:
      path: vscode/settings.json
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/Library/Application Support/Code/User/keybindings.json:
      path: vscode/keybindings.json
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/Library/Preferences/clangd/config.yaml:
      path: clang/config.yaml
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'
    ~/.clang-format:
      path: clang/clang-format
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "full" ]'

    # Minimal install
    ~/.bashrc.dotfiles:
      path: term/bashrc.dotfiles
      force: true
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "minimal" ]'
    ~/.bash_prompt:
      path: term/bash_prompt.bash
      force: true
      if: '[ "${DOTFILES_INSTALL_MODE:-full}" = "minimal" ]'

    # Agents
    ## Claude
    ~/.claude/settings.json:
      path: agents/claude/settings.json
      force: true
    ~/.config/ccstatusline/settings.json:
      path: agents/claude/ccstatusline-settings.json
      force: true
    ~/.claude/CLAUDE.md:
      path: agents/shared/instructions.md
      force: true
    ~/.claude/skills:
      path: agents/claude/skills
      glob: false
      force: true
    ~/.claude/commands:
      path: agents/claude/commands
      glob: false
      force: true
    ## Codex
    ~/.codex/config.toml:
      path: agents/codex/config.toml
      force: true
    ~/.codex/AGENTS.md:
      path: agents/shared/instructions.md
      force: true
    ~/.codex/skills:
      path: agents/codex/skills
      glob: false
      force: true

- shell:
    # Bash: source dotfiles bashrc on minimal installs only
    - description: Hooking into .bashrc and .bash_profile
      command: |
        if [ "${DOTFILES_INSTALL_MODE:-full}" != "minimal" ]; then
          echo "Skipping bash hooks outside minimal install"
          exit 0
        fi
        grep -qF 'bashrc.dotfiles' "$HOME/.bashrc" 2>/dev/null || \
          echo '[ -f "$HOME/.bashrc.dotfiles" ] && . "$HOME/.bashrc.dotfiles"' >> "$HOME/.bashrc"
        grep -qF 'bashrc.dotfiles' "$HOME/.bash_profile" 2>/dev/null || \
          echo '[ -f "$HOME/.bashrc.dotfiles" ] && . "$HOME/.bashrc.dotfiles"' >> "$HOME/.bash_profile"
      stdout: true
      stderr: true

    # Git aliases: add include only if not already present
    - description: Configuring git aliases
      command: |
        git config --global --get-all include.path 2>/dev/null | grep -qF 'gitalias.txt' || \
          git config --global --add include.path ~/.gitalias.txt
        git config --global --get core.excludesfile >/dev/null 2>&1 || \
          git config --global core.excludesfile ~/.gitignore
      stdout: true
      stderr: true

    # ccstatusline: best effort, failure does not abort install
    - description: Installing ccstatusline (optional)
      command: |
        if command -v npx >/dev/null 2>&1; then
          npx -y --package ccstatusline@latest node -e "process.exit(0)" 2>/dev/null && echo "ccstatusline OK" || echo "ccstatusline install failed (non-fatal)"
        else
          echo "npx not found, skipping ccstatusline (non-fatal)"
        fi
      stdout: true
      stderr: true

    # Agent plugins
    - description: Installing and updating Claude plugins (optional)
      command: scripts/install-claude-plugins
      stdout: true
      stderr: true
    - description: Installing and updating Codex plugins (optional)
      command: scripts/install-codex-plugins
      stdout: true
      stderr: true
