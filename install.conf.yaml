- defaults:
    link:
      relink: true
      create: true
      glob: true

- clean: ["~", "~/.zsh", "~/.claude"]

- link:
    # Terminal
    ~/.zsh: term/zsh
    ~/.zshrc: term/zshrc
    ~/.config/starship.toml: term/starship.toml

    # Git
    ~/.gitconfig: git/gitconfig
    ~/.gitalias.txt: git/gitalias.txt
    ~/.gitattributes: git/gitattributes
    ~/.gitignore: git/gitignore

    # SSH
    ~/.ssh/config: ssh/config

    # Claude
    ~/.claude/settings.json: claude/claude-settings.json
    ~/.config/ccstatusline/settings.json: claude/ccstatusline-settings.json

    # VSCode (macOS)
    ~/Library/Application Support/Code/User/settings.json: vscode/settings.json
    ~/Library/Application Support/Code/User/keybindings.json: vscode/keybindings.json

    # Clang
    ~/Library/Preferences/clangd/config.yaml: clang/config.yaml
    ~/.clang-format: clang/clang-format

    # Scripts
    ~/bin/claude-validate: bin/claude-validate
    ~/bin/dotfiles: bin/dotfiles
    ~/bin/git-nuke: bin/git-nuke
    ~/bin/sshkey: bin/sshkey

- shell:
    # Git aliases: add include only if not already present
    - description: Configuring git aliases
      command: |
        git config --global --get-all include.path 2>/dev/null | grep -qF 'gitalias.txt' || \
          git config --global --add include.path ~/.gitalias.txt
        git config --global --get core.excludesfile >/dev/null 2>&1 || \
          git config --global core.excludesfile ~/.gitignore
      stdout: true
      stderr: true

    # ccstatusline: best effort, failure does not abort install
    - description: Installing ccstatusline (optional)
      command: |
        if command -v npx >/dev/null 2>&1; then
          npx -y ccstatusline@latest --version < /dev/null 2>/dev/null && echo "ccstatusline OK" || echo "ccstatusline install failed (non-fatal)"
        else
          echo "npx not found, skipping ccstatusline (non-fatal)"
        fi
      stdout: true
      stderr: true
