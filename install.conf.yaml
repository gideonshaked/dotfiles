- defaults:
    link:
      relink: true
      create: true
      glob: true

- clean: ["~", "~/.zsh", "~/bin", "~/.claude"]

- link:
    # Terminal
    ~/.zsh: term/zsh
    ~/.zshrc: term/zshrc
    ~/.config/starship.toml: term/starship.toml

    # Git
    ~/.gitconfig: git/gitconfig
    ~/.gitalias.txt: git/gitalias.txt
    ~/.gitattributes: git/gitattributes
    ~/.gitignore: git/gitignore

    # SSH
    ~/.ssh/config: ssh/config

    # Claude
    ~/.claude/settings.json: claude/claude-settings.json
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.config/ccstatusline/settings.json: claude/ccstatusline-settings.json

    # VSCode (macOS)
    ~/Library/Application Support/Code/User/settings.json: vscode/settings.json
    ~/Library/Application Support/Code/User/keybindings.json: vscode/keybindings.json

    # Clang
    ~/Library/Preferences/clangd/config.yaml: clang/config.yaml
    ~/.clang-format: clang/clang-format

    # Scripts
    ~/bin: bin

- shell:
    - git submodule sync --recursive
    - git submodule update --init --recursive
